name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *" # Her 12 saatte bir çalıştır (Turkish comment 🐢)
  workflow_dispatch: # Manuel olarak istediğimiz zaman tetikleyebiliriz
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # Yılan animasyonumuz 'output' adında yeni bir branch'e pushlanacak
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
