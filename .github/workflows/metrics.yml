name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Berlin

          # Isometric calendar (3D cube view)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Lines of code
          plugin_lines: yes

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          plugin_achievements_display: compact

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Recent activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          # Followers / following avatars
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 800
          plugin_people_size: 28

          # Starred repos
          plugin_stars: yes
          plugin_stars_limit: 4

          # Notable contributions
          plugin_notable: yes

          # Starred topics
          plugin_topics: yes
          plugin_topics_sort: random

          # Reactions
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 14
          plugin_reactions_details: percentage

  github-metrics-detailed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-detailed.svg
          base: metadata
          config_timezone: Europe/Berlin

          # Detailed language breakdown
          plugin_languages: yes
          plugin_languages_colors: rainbow
          plugin_languages_details: bytes-size, percentage

          # Open/closed issue & PR follow-up
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes
